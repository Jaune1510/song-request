<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SR Test</title>
<style>
    body {
        background: #111;
        color: white;
        font-family: Arial;
        padding: 20px;
    }
    #log {
        width: 100%;
        height: 300px;
        background: #222;
        padding: 10px;
        overflow-y: scroll;
        border: 1px solid #444;
    }
</style>
</head>
<body>

<h2>Test de Song Request desde Twitch Chat</h2>
<p>Si escribes en el chat <b>!sr LINK</b>, aquí debe aparecer lo que capture.</p>

<div id="log"></div>

<script>
/* ---------------------------------------------
   1. Configuración
----------------------------------------------*/
const CONFIG = {
    twitchChannel: "jaunehale_mochi",   // 👈 CAMBIA ESTO
};

/* ---------------------------------------------
   2. Log visual
----------------------------------------------*/
function log(msg) {
    const div = document.getElementById("log");
    div.innerHTML += msg + "<br>";
    div.scrollTop = div.scrollHeight;
}

/* ---------------------------------------------
   3. Conexión al chat TMI como usuario anónimo
----------------------------------------------*/
let chatWs;

function connectChat() {
    const randomUser = "justinfan" + Math.floor(Math.random() * 90000 + 10000);

    chatWs = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

    chatWs.onopen = function () {
        log("Conectado a Twitch Chat como " + randomUser);
        chatWs.send(`NICK ${randomUser}`);
        chatWs.send(`JOIN #${CONFIG.twitchChannel}`);
    };

    chatWs.onmessage = function (event) {
        const raw = event.data.trim();

        // Twitch pings
        if (raw.startsWith("PING")) {
            chatWs.send("PONG :tmi.twitch.tv");
            return;
        }

        // Regex permisivo (como tu modelo viejo)
        const match = raw.match(/:(.+?)!.* PRIVMSG #\w+ :(.*)/);
        if (!match) return;

        const username = match[1];
        const message = match[2];

        log(`<b>${username}</b>: ${message}`);

        // Detectar comandos SR
        if (message.toLowerCase().startsWith("!sr ")) {
            const link = message.substring(4).trim();
            log(`<span style="color:#0f0">Pedido detectado: ${link}</span>`);
        }
    };

    chatWs.onclose = function () {
        log("<span style='color:red'>Desconectado. Reintentando en 2s…</span>");
        setTimeout(connectChat, 2000);
    };
}

connectChat();
</script>

</body>
</html>
